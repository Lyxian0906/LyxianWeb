<!doctype html>
<html>
	<head>
		<title>My tree</title>
		<link rel="stylesheet" href="../Design/mytree.css" />
	</head>
	<body>
		<div class="content">
			<h1 id="welcome2"></h1>
		</div>
		<div class="container">
			<button id="goback">Go to main page</button>
            <button id="addMemory">+</button>
		</div>
        <div id="memoryMenu" class="hidden">
            <button id="closeMenu">✕</button>

    <h2>Nueva memoria</h2>

    <input
        id="title"
        type="text"
        placeholder="Título">

    <textarea
        id="description"
        placeholder="Descripción"></textarea>

    <select id="emotion">

        <option value="yellow">Happy</option>
        <option value="blue">Sad</option>
        <option value="red">Angry</option>
        <option value="green">Calm</option>

    </select>

    <textarea
        id="notes"
        placeholder="Notes"></textarea>

    <button id="accept">
        Aceptar
    </button>

</div>

		<script type="module" src="../FireBase/app.js"></script>
	</body>
</html>
